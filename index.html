<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Page Index</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #172033;
      --muted: #647083;
      --accent: #1f6feb;
      --border: #d8dee8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 40px 24px;
    }

    main {
      width: min(100%, 880px);
      margin: 0 auto;
    }

    header {
      margin-bottom: 28px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }

    header p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(23, 32, 51, 0.08);
      padding: 24px;
    }

    section h2 {
      margin-bottom: 16px;
      font-size: 1.3rem;
    }

    ul {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 52px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      background: #fbfcff;
      font-weight: 700;
      text-decoration: none;
    }

    a::after {
      content: "Open";
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    a:hover,
    a:focus-visible {
      border-color: var(--accent);
      background: #eef5ff;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>HTML Page Index</h1>
      <p>Links to HTML files organized by project directory.</p>
    </header>

    <section aria-labelledby="dae-heading">
      <h2 id="dae-heading">DAE</h2>
      <ul>
        <li>
          <a href="00_DAE/00_kernel/kernel_model.html">Kernel Model</a>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
