<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAE Kernel Model</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #172033;
      --muted: #647083;
      --accent: #1f6feb;
      --border: #d8dee8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 40px 24px;
    }

    main {
      width: min(100%, 760px);
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(23, 32, 51, 0.08);
      padding: 32px;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      margin-bottom: 24px;
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1.1;
    }

    p {
      margin-top: 16px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <a href="../../index.html">Back to index</a>
    <h1>DAE Kernel Model</h1>
    <p>
      This page is a starting point for notes, diagrams, and documentation about
      the DAE kernel model.
    </p>
  </main>
</body>
</html>
